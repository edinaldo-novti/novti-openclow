# ============================================================
# OpenClow — Docker Compose (Produção / Coolify-Friendly)
# ============================================================
# Requisitos:
#   - Arquivo .env configurado com todas as variáveis
#   - Rede externa 'proxy' criada pelo Traefik/Coolify
# Uso: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ==================== Openflow ====================
  openflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GHCR_IMAGE:-ghcr.io/edinaldo-novti/novti-openclow}:${IMAGE_TAG:-latest}
    container_name: openclow-openflow
    restart: unless-stopped
    volumes:
      - openclaw_data:/root/.openclaw
    environment:
      - NODE_ENV=production
      - PORT=${OPENFLOW_PORT:-8080}
      - OPENCLOW_GATEWAY_PORT=${OPENFLOW_PORT:-8080}
      - OPENCLOW_GATEWAY_BIND=lan
      - OPENCLOW_GATEWAY_AUTH_MODE=token
      - OPENCLOW_GATEWAY_AUTH_TOKEN=${OPENCLOW_GATEWAY_TOKEN}
      - OPENCLOW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      - OPENFLOW_ADMIN_PASSWORD=${OPENFLOW_ADMIN_PASSWORD}

    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: "${OPENFLOW_CPU_LIMIT:-1.0}"
          memory: ${OPENFLOW_MEMORY_LIMIT:-1g}
        reservations:
          cpus: "0.25"
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openflow.rule=Host(`${OPENFLOW_DOMAIN:-ia.nogui.com.br}`)"
      - "traefik.http.routers.openflow.entrypoints=websecure"
      - "traefik.http.routers.openflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.openflow.loadbalancer.server.port=8080"
      - "traefik.docker.network=coolify"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
volumes:
  openclaw_data:
    driver: local

networks:
  coolify:
    external: true
