# ============================================================
# OpenClow — Docker Compose (Desenvolvimento)
# ============================================================
# Uso: docker compose up -d
# ============================================================

services:
  # ==================== Openflow ====================
  openflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclow-openflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - openclaw_data:/root/.openclaw
    environment:
      - NODE_ENV=development
      - PORT=${OPENFLOW_PORT:-8080}
      - OPENCLOW_GATEWAY_PORT=${OPENFLOW_PORT:-8080}
      - OPENCLOW_GATEWAY_BIND=lan
      - OPENCLOW_GATEWAY_AUTH_MODE=token
      - OPENCLOW_GATEWAY_AUTH_TOKEN=${OPENCLOW_GATEWAY_TOKEN}
      - OPENCLOW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      - OPENFLOW_ADMIN_PASSWORD=${OPENFLOW_ADMIN_PASSWORD}

    networks:
      - openclow-dev
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
# ==================== Networks ====================
networks:
  openclow-dev:
    driver: bridge
    name: openclow-dev

volumes:
  openclaw_data:
    driver: local
